<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Điều Khiển Bot Xe Ghép Liêu Hải</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding: 15px; margin: 0; color: #333; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        h2 { margin-top: 0; color: #1a73e8; font-size: 18px; border-left: 4px solid #1a73e8; padding-left: 10px; }
        .switch-group { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding: 10px 0; border-bottom: 1px solid #eee; }
        .time-range { display: flex; gap: 10px; margin-top: 10px; margin-bottom: 15px; }
        .time-box { flex: 1; }
        .time-box span { display: block; font-size: 13px; color: #666; margin-bottom: 5px; }
        input[type="time"] { padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; width: 100%; box-sizing: border-box; }
        
        /* Style cho nút chọn hướng đi */
        .direction-group { display: flex; gap: 10px; margin-bottom: 15px; }
        .dir-btn { flex: 1; padding: 12px; border: 2px solid #ddd; background: #fff; border-radius: 8px; font-weight: bold; cursor: pointer; text-align: center; font-size: 14px; }
        .dir-btn.active { border-color: #1a73e8; background: #e8f0fe; color: #1a73e8; }

        button.btn-main { background: #1a73e8; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:active { transform: scale(0.98); }
        .location-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 15px; }
        .location-item { display: flex; align-items: center; padding: 10px; background: #f8f9fa; border: 1px solid #eee; border-radius: 8px; }
        input[type="checkbox"] { width: 20px; height: 20px; margin-right: 10px; }
        .status { font-size: 13px; text-align: center; color: #666; margin-top: 15px; padding: 8px; border-radius: 5px; background: #e8f0fe; }
        label { cursor: pointer; font-size: 14px; font-weight: 500; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Cấu Hình Bộ Lọc Vồ Chuyến</h2>
        <div class="switch-group">
            <span><b>Trạng thái hoạt động Bot</b></span>
            <input type="checkbox" id="bot-active" style="width: 25px; height: 25px;">
        </div>

        <span style="display: block; font-size: 13px; color: #666; margin-bottom: 5px;">Hướng di chuyển của xe:</span>
        <div class="direction-group">
            <div class="dir-btn active" id="dir-ve" onclick="setDirection('VE')">HÀ NỘI → NAM ĐỊNH (ĐÓN VỀ)</div>
            <div class="dir-btn" id="dir-len" onclick="setDirection('LEN')">NAM ĐỊNH → HÀ NỘI (ĐÓN LÊN)</div>
        </div>

        <div class="time-range">
            <div class="time-box">
                <span>Từ khung giờ (Start):</span>
                <input type="time" id="start-time">
            </div>
            <div class="time-box">
                <span>Đến khung giờ (End):</span>
                <input type="time" id="end-time">
            </div>
        </div>
        <button class="btn-main" onclick="updateConfig()">LƯU CẤU HÌNH GIAO LỘ</button>
        <div id="status-msg" class="status">Hệ thống đang kết nối...</div>
    </div>

    <div class="card">
        <h2>30 Quận Huyện Hà Nội (Tích chọn địa bàn nhận)</h2>
        <div class="location-grid" id="location-list">
            <p style="text-align: center; color: #999; grid-column: 1/-1;">Đang tải danh sách địa bàn...</p>
        </div>
        <button class="btn-main" onclick="updateLocations()" style="background: #34a853; margin-top: 15px;">CẬP NHẬT ĐỊA BÀN NHẬN LỊCH</button>
    </div>

    <script>
        const SUPABASE_URL = 'https://rcndrqiebvdynqrmkamm.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_FTmHIei2ao0danjQfkuo5Q_qcHSKXZA';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let selectedDirection = 'VE';

        function setDirection(dir) {
            selectedDirection = dir;
            document.getElementById('dir-ve').classList.toggle('active', dir === 'VE');
            document.getElementById('dir-len').classList.toggle('active', dir === 'LEN');
        }

        async function loadData() {
            const status = document.getElementById('status-msg');
            try {
                const { data: config } = await supabaseClient.from('bot_config').select('*').eq('id', 1).single();
                if (config) {
                    document.getElementById('bot-active').checked = config.is_active;
                    document.getElementById('start-time').value = config.start_time.substring(0, 5);
                    document.getElementById('end-time').value = config.end_time.substring(0, 5);
                    setDirection(config.direction || 'VE');
                }

                const { data: locations } = await supabaseClient.from('locations_whitelist').select('*').order('id', { ascending: true });
                if (locations) {
                    const listDiv = document.getElementById('location-list');
                    listDiv.innerHTML = '';
                    locations.forEach(loc => {
                        listDiv.innerHTML += `
                            <div class="location-item">
                                <input type="checkbox" class="loc-cb" id="loc-${loc.id}" data-id="${loc.id}" ${loc.is_enabled ? 'checked' : ''}>
                                <label for="loc-${loc.id}">${loc.region_name}</label>
                            </div>
                        `;
                    });
                }
                status.innerText = "Sẵn sàng (Cập nhật lúc: " + new Date().toLocaleTimeString() + ")";
            } catch (e) {
                status.innerText = "Lỗi kết nối dữ liệu!";
            }
        }

        async function updateConfig() {
            const status = document.getElementById('status-msg');
            const isActive = document.getElementById('bot-active').checked;
            const startTime = document.getElementById('start-time').value;
            const endTime = document.getElementById('end-time').value;

            if (!startTime || !endTime) {
                alert("Anh Lâm điền đủ khung giờ nhé!");
                return;
            }

            status.innerText = "Đang lưu cấu hình...";
            const { error } = await supabaseClient.from('bot_config').update({ 
                is_active: isActive, 
                start_time: startTime + ":00", 
                end_time: endTime + ":00",
                direction: selectedDirection
            }).eq('id', 1);

            if (!error) {
                alert("Đã cấu hình bộ lọc chuyến thành công!");
                status.innerText = "Đã cập nhật cấu hình lúc " + new Date().toLocaleTimeString();
            } else {
                alert("Lỗi: " + error.message);
            }
        }

        async function updateLocations() {
            const status = document.getElementById('status-msg');
            const checkboxes = document.querySelectorAll('.loc-cb');
            status.innerText = "Đang lưu địa bàn...";
            let errorOccurred = false;

            for (let cb of checkboxes) {
                const rowId = cb.getAttribute('data-id');
                const isEnabled = cb.checked;
                const { error } = await supabaseClient.from('locations_whitelist').update({ is_enabled: isEnabled }).eq('id', rowId);
                if (error) errorOccurred = true;
            }

            if (!errorOccurred) {
                alert("Đã cập nhật vùng nhận chuyến thành công!");
                status.innerText = "Vùng đón sẵn sàng lúc " + new Date().toLocaleTimeString();
            } else {
                alert("Có lỗi xảy ra!");
            }
        }

        loadData();
    </script>
</body>
</html>
