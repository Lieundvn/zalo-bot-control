<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Điều Khiển Bot Liêu Hải - Bản Đồ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding: 10px; margin: 0; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 10px; }
        h2 { margin-top: 0; color: #1a73e8; font-size: 16px; border-left: 4px solid #1a73e8; padding-left: 10px; }
        /* Kích thước bản đồ */
        #map { height: 350px; width: 100%; border-radius: 8px; margin: 10px 0; border: 1px solid #ddd; }
        .btn-main { background: #1a73e8; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; }
        .btn-red { background: #d93025; margin-top: 10px; }
        .status { font-size: 12px; text-align: center; color: #666; margin-top: 10px; }
        .info { font-size: 12px; background: #fffde7; padding: 8px; border-radius: 5px; margin-bottom: 10px; border: 1px solid #ffe082; }
    </style>
</head>
<body>

    <div class="card">
        <h2>🔥 LỆNH NHANH</h2>
        <button class="btn-main btn-red" onclick="clearJourney()">XÓA HÀNH TRÌNH CHUYẾN MỚI</button>
    </div>

    <div class="card">
        <h2>📍 KHOANH VÙNG NHẬN KHÁCH (Dưới 30p)</h2>
        <div class="info">Anh Lâm di chuyển <b>Vòng tròn xanh</b> đến khu vực muốn nhận khách. Bot sẽ tự tính toán các điểm xung quanh đó.</div>
        
        <div id="map"></div>
        
        <div style="margin-top: 10px;">
            <span style="font-size: 13px;">Bán kính đón khách (mét): </span>
            <input type="range" id="radiusRange" min="500" max="5000" step="100" style="width: 100%;" oninput="updateCircleRadius(this.value)">
            <center><b id="radiusVal">2000</b> m</center>
        </div>

        <div style="margin-top: 15px;">
            <span style="font-size: 13px;">Hướng di chuyển:</span>
            <select id="direction" style="width: 100%; padding: 10px; border-radius: 5px; margin-top: 5px; font-size: 14px;">
                <option value="VE">HÀ NỘI -> NAM ĐỊNH (VỀ)</option>
                <option value="LEN">NAM ĐỊNH -> HÀ NỘI (LÊN)</option>
            </select>
        </div>

        <button class="btn-main" style="margin-top: 15px;" onclick="saveMapConfig()">LƯU VÙNG ĐÓN & CẤU HÌNH</button>
        <div id="status-msg" class="status">Đang kết nối bản đồ...</div>
    </div>

    <script>
        const SUPABASE_URL = 'https://rcndrqiebvdynqrmkamm.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_FTmHIei2ao0danjQfkuo5Q_qcHSKXZA';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let map, circle, marker;
        let currentLat = 20.9845, currentLng = 105.8425, currentRad = 2000;

        // Khởi tạo bản đồ
        function initMap() {
            map = L.map('map').setView([currentLat, currentLng], 12);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);

            // Tạo vòng tròn có thể di chuyển
            circle = L.circle([currentLat, currentLng], {
                color: '#1a73e8',
                fillColor: '#1a73e8',
                fillOpacity: 0.2,
                radius: currentRad,
                draggable: true
            }).addTo(map);

            // Điểm tâm để anh kéo cho dễ
            marker = L.marker([currentLat, currentLng], { draggable: true }).addTo(map);

            // Đồng bộ kéo marker và vòng tròn
            marker.on('drag', function (e) {
                const position = marker.getLatLng();
                circle.setLatLng(position);
                currentLat = position.lat;
                currentLng = position.lng;
            });
        }

        function updateCircleRadius(val) {
            currentRad = parseInt(val);
            document.getElementById('radiusVal').innerText = val;
            circle.setRadius(currentRad);
        }

        async function loadData() {
            const { data: config } = await supabaseClient.from('bot_config').select('*').eq('id', 1).single();
            if (config) {
                currentLat = config.map_lat || 20.9845;
                currentLng = config.map_lng || 105.8425;
                currentRad = config.map_radius || 2000;
                document.getElementById('direction').value = config.direction;
                document.getElementById('radiusRange').value = currentRad;
                document.getElementById('radiusVal').innerText = currentRad;
                
                if (!map) initMap();
                marker.setLatLng([currentLat, currentLng]);
                circle.setLatLng([currentLat, currentLng]);
                circle.setRadius(currentRad);
                map.setView([currentLat, currentLng], 13);
            }
            document.getElementById('status-msg').innerText = "Đã tải tọa độ mới nhất!";
        }

        async function saveMapConfig() {
            const status = document.getElementById('status-msg');
            status.innerText = "Đang lưu tọa độ...";
            
            const direction = document.getElementById('direction').value;
            const { error } = await supabaseClient.from('bot_config').update({
                map_lat: currentLat,
                map_lng: currentLng,
                map_radius: currentRad,
                direction: direction
            }).eq('id', 1);

            if (!error) alert("Đã lưu vùng đón khách thành công!");
            else alert("Lỗi: " + error.message);
            loadData();
        }

        async function clearJourney() {
            if (!confirm("Xóa lịch cũ để bắt đầu chuyến mới chứ anh Lâm?")) return;
            await supabaseClient.from('bot_config').update({ last_clear_at: new Date().toISOString() }).eq('id', 1);
            alert("Đã xóa hành trình!");
        }

        loadData();
    </script>
</body>
</html>
