<div class="card">
    <h2>🛤️ VẼ LỘ TRÌNH UỐN LƯỢN (HÀNH LANG 5KM)</h2>
    <p style="font-size: 12px; color: #666;">Bấm lên bản đồ để thêm điểm rẽ. Kéo điểm để chỉnh đường.</p>
    <div id="map" style="height: 450px; border-radius: 10px; border: 2px solid #1a73e8;"></div>
    <div style="display: flex; gap: 10px; margin-top: 10px;">
        <button class="btn-main" onclick="savePath()">LƯU LỘ TRÌNH</button>
        <button class="btn-main" style="background:#666" onclick="resetPath()">XÓA VẼ LẠI</button>
    </div>
</div>

<script>
    let map, polyline, markers = [];

    function initMap() {
        map = L.map('map').setView([21.028, 105.852], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        polyline = L.polyline([], {color: '#1a73e8', weight: 6, opacity: 0.7}).addTo(map);
        // Dải hành lang xanh mờ 5km
        buffer = L.polyline([], {color: '#1a73e8', weight: 50, opacity: 0.15}).addTo(map);

        map.on('click', function(e) {
            addPoint(e.latlng);
        });
    }

    function addPoint(latlng) {
        let marker = L.marker(latlng, {draggable: true}).addTo(map);
        marker.on('drag', updatePolyline);
        marker.on('contextmenu', function() { // Chuột phải hoặc giữ lâu để xóa điểm
            map.removeLayer(marker);
            markers = markers.filter(m => m !== marker);
            updatePolyline();
        });
        markers.push(marker);
        updatePolyline();
    }

    function updatePolyline() {
        let coords = markers.map(m => m.getLatLng());
        polyline.setLatLngs(coords);
        buffer.setLatLngs(coords);
    }

    function resetPath() {
        markers.forEach(m => map.removeLayer(m));
        markers = [];
        updatePolyline();
    }

    async function savePath() {
        const coords = markers.map(m => ({lat: m.getLatLng().lat, lng: m.getLatLng().lng}));
        const { error } = await supabaseClient.from('bot_config').update({
            path_data: coords
        }).eq('id', 1);
        if (!error) alert("Đã lưu lộ trình uốn lượn thành công!");
    }
    initMap();
</script>
