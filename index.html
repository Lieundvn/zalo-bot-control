<div class="card">
    <h2>🗺️ VẼ LỘ TRÌNH CHẠY (HÀNH LANG 5KM)</h2>
    <div id="map" style="height: 400px; border-radius: 10px;"></div>
    <button class="btn-main" style="margin-top:10px" onclick="savePath()">LƯU LỘ TRÌNH CHẠY</button>
</div>

<script>
    let map, polyline, startMarker, endMarker;
    let pStart = [21.212, 105.803]; // Mặc định Nội Bài
    let pEnd = [20.950, 105.850];   // Mặc định Pháp Vân

    function initMap() {
        map = L.map('map').setView([21.028, 105.852], 10);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Tạo 2 điểm mút có thể kéo
        startMarker = L.marker(pStart, {draggable: true, title: "Điểm đầu"}).addTo(map);
        endMarker = L.marker(pEnd, {draggable: true, title: "Điểm cuối"}).addTo(map);

        // Vẽ đường nối
        polyline = L.polyline([pStart, pEnd], {color: 'red', weight: 5, opacity: 0.5}).addTo(map);

        // Hiệu ứng hành lang 5km (giả lập bằng nét vẽ đậm)
        let buffer = L.polyline([pStart, pEnd], {color: 'blue', weight: 40, opacity: 0.1}).addTo(map);

        function updatePath() {
            let latlngs = [startMarker.getLatLng(), endMarker.getLatLng()];
            polyline.setLatLngs(latlngs);
            buffer.setLatLngs(latlngs);
        }

        startMarker.on('drag', updatePath);
        endMarker.on('drag', updatePath);
    }

    async function savePath() {
        const s = startMarker.getLatLng();
        const e = endMarker.getLatLng();
        const { error } = await supabaseClient.from('bot_config').update({
            path_start_lat: s.lat, path_start_lng: s.lng,
            path_end_lat: e.lat, path_end_lng: e.lng
        }).eq('id', 1);
        if (!error) alert("Đã lưu lộ trình Vành Đai 3!");
    }
    initMap();
</script>
