<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Điều Khiển Bot Xe Ghép</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f0f2f5; padding: 15px; margin: 0; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        h2 { margin-top: 0; color: #1a73e8; font-size: 18px; }
        .switch-group { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        input[type="time"] { padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; width: 100%; box-sizing: border-box; }
        button { background: #1a73e8; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:active { background: #1557b0; }
        .location-item { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .location-item:last-child { border-bottom: none; }
        input[type="checkbox"] { transform: scale(1.3); margin-right: 15px; }
        .status { font-size: 14px; text-align: center; color: #666; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>Trạng Thái Hoạt Động</h2>
        <div class="switch-group">
            <span>Bật/Tắt Bot Vồ Lịch</span>
            <input type="checkbox" id="bot-active">
        </div>
        <div style="margin-top: 10px;">
            <span>Giờ xuất phát (±30p):</span>
            <input type="time" id="target-time">
        </div>
        <button onclick="updateConfig()">LƯU CẤU HÌNH</button>
        <div id="status-msg" class="status">Đang tải dữ liệu...</div>
    </div>

    <div class="card">
        <h2>Vùng Đón Khách</h2>
        <div id="location-list">
            </div>
        <button onclick="updateLocations()" style="background: #34a853;">CẬP NHẬT VÙNG ĐÓN</button>
    </div>

    <script>
        // THAY THÔNG TIN SUPABASE CỦA ANH VÀO ĐÂY
        const SUPABASE_URL = 'https://xxxx.supabase.co';
        const SUPABASE_KEY = 'eyjxxxx...';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 1. Tải dữ liệu từ Supabase khi mở web
        async function loadData() {
            // Tải cấu hình bot
            const { data: config } = await supabase.from('bot_config').select('*').eq('id', 1).single();
            if (config) {
                document.getElementById('bot-active').checked = config.is_active;
                document.getElementById('target-time').value = config.target_time.substring(0, 5);
            }

            // Tải danh sách vùng đón
            const { data: locations } = await supabase.from('locations_whitelist').select('*').order('id');
            const listDiv = document.getElementById('location-list');
            listDiv.innerHTML = '';
            locations.forEach(loc => {
                listDiv.innerHTML += `
                    <div class="location-item">
                        <input type="checkbox" class="loc-cb" data-id="${loc.id}" ${loc.is_enabled ? 'checked' : ''}>
                        <span>${loc.region_name}</span>
                    </div>
                `;
            });
            document.getElementById('status-msg').innerText = "Đã kết nối Supabase";
        }

        // 2. Cập nhật Bật/Tắt và Giờ chạy
        async function updateConfig() {
            const is_active = document.getElementById('bot-active').checked;
            const target_time = document.getElementById('target-time').value + ":00";
            
            const { error } = await supabase.from('bot_config').update({ is_active, target_time }).eq('id', 1);
            if (!error) alert("Đã lưu cấu hình Bot!");
            else alert("Lỗi: " + error.message);
        }

        // 3. Cập nhật các vùng đón được chọn
        async function updateLocations() {
            const checkboxes = document.querySelectorAll('.loc-cb');
            for (let cb of checkboxes) {
                const id = cb.getAttribute('data-id');
                const is_enabled = cb.checked;
                await supabase.from('locations_whitelist').update({ is_enabled }).eq('id', id);
            }
            alert("Đã cập nhật các vùng đón!");
        }

        loadData();
    </script>
</body>
</html>
